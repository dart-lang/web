name: package:web_generator
permissions: read-all

on:
  # Run CI on pushes to the main branch and on PRs.
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/web_generator.yaml'
      - 'web_generator/**'
      - 'js_interop_gen/**'
  pull_request:
    paths:
      - '.github/workflows/web_generator.yaml'
      - 'web_generator/**'
      - 'js_interop_gen/**'
  schedule:
    - cron: "0 0 * * 0"

defaults:
  run:
    working-directory: web_generator/

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sdk: ['3.10', dev]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: dart-lang/setup-dart@e51d8e571e22473a2ddebf0ef8a2123f0ab2c02c
        with:
          sdk: ${{ matrix.sdk }}

      - run: dart pub get
      - run: dart format --output=none --set-exit-if-changed .
        if: matrix.sdk == 'dev'
      - run: dart analyze --fatal-infos
        if: matrix.sdk == 'dev'
      - run: dart analyze
        if: matrix.sdk != 'dev'
      - run: dart test

  # test bin/update_idl_bindings.dart
  test_generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: dart-lang/setup-dart@e51d8e571e22473a2ddebf0ef8a2123f0ab2c02c

      - run: npm install
      - run: dart pub get
      - run: dart pub -C ../web get
      - run: dart pub -C ../js_interop_gen get
      - run: dart bin/update_idl_bindings.dart
      - run: dart analyze --fatal-infos ../web

  # test bin/update_idl_bindings.dart --generate-all
  test_generate_all:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: dart-lang/setup-dart@e51d8e571e22473a2ddebf0ef8a2123f0ab2c02c

      - run: npm install
      - run: dart pub get
      - run: dart pub -C ../web get
      - run: dart pub -C ../js_interop_gen get
      - run: dart bin/update_idl_bindings.dart --generate-all
      - run: dart analyze --fatal-infos ../web
